# ============================================================
# Inventory Management — Docker Compose
# ============================================================
# Usage:
#   docker compose up --build          # local PostgreSQL (no cloud needed)
#   docker compose up --build -d       # detached
#
# To use your Neon DB instead of the local PG container:
#   1. Comment out the `db` service below
#   2. In the `backend` service, replace DATABASE_URL with your Neon connection string
#   3. Remove `depends_on: [db]` from the backend service

version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory_pass}
      POSTGRES_DB: ${POSTGRES_DB:-inventorydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory} -d ${POSTGRES_DB:-inventorydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    environment:
      # Local PostgreSQL — change to your Neon URL to use cloud DB
      DATABASE_URL: postgresql://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory_pass}@db:5432/${POSTGRES_DB:-inventorydb}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Must point to a URL reachable from the browser (not the internal Docker network)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: inventory_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: inventory_postgres_data
